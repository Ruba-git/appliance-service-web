<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appliance Care | Signup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Sign up to access instant service booking.</p>

      <form class="auth-form" id="signup-form">
        <label>Full Name</label>
        <input type="text" placeholder="Your name" required />

        <label>Email</label>
        <input type="email" placeholder="you@example.com" required />

        <label>Password</label>
        <input type="password" placeholder="Create password" required />

        <button type="submit" class="btn primary">Sign with Email</button>
      </form>

      <button class="btn google" id="google-signup">Sign with Google</button>

      <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
