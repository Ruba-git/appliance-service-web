<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appliance Care | Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>Appliance Care</h1>
      <p class="subtitle">Login to book AC, Refrigerator, and Washing Machine services.</p>

      <form class="auth-form" id="login-form">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" required />

        <label>Password</label>
        <input type="password" placeholder="••••••••" required />

        <button type="submit" class="btn primary">Login with Email</button>
      </form>

      <button class="btn google" id="google-login">Sign with Google</button>

      <p class="switch-link">New user? <a href="signup.html">Create account</a></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
